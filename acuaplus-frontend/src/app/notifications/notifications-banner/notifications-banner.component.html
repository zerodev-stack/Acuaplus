<!-- src/app/notifications/notifications-list/notifications-list.component.html -->
<div class="container py-4">

  <!-- Encabezado -->
  <div class="d-flex align-items-center justify-content-between mb-4">
    <div class="d-flex align-items-center gap-2">
      <h4 class="mb-0 fw-bold">Notificaciones</h4>
      <span *ngIf="unreadCount > 0" class="badge bg-danger rounded-pill">
        {{ unreadCount }} sin leer
      </span>
    </div>
    <button
      *ngIf="unreadCount > 0"
      class="btn btn-outline-secondary btn-sm"
      (click)="markAllRead()">
      <i class="bi bi-check2-all me-1"></i>Marcar todas como leídas
    </button>
  </div>

  <!-- Error -->
  <div *ngIf="error" class="alert alert-danger">{{ error }}</div>

  <!-- Loading -->
  <div *ngIf="loading" class="text-center py-5">
    <div class="spinner-border text-primary" role="status"></div>
    <p class="mt-2 text-muted">Cargando notificaciones...</p>
  </div>

  <!-- Lista vacía -->
  <div *ngIf="!loading && notifications.length === 0 && !error"
       class="text-center py-5 text-muted">
    <i class="bi bi-bell-slash fs-1 d-block mb-3"></i>
    <p>No tienes notificaciones.</p>
  </div>

  <!-- Lista de notificaciones -->
  <div *ngIf="!loading && notifications.length > 0" class="list-group shadow-sm">
    <button
      *ngFor="let n of notifications"
      type="button"
      class="list-group-item list-group-item-action d-flex align-items-start gap-3 py-3"
      [class.notif-unread]="!n.is_read"
      (click)="markAsRead(n)">

      <!-- Ícono tipo -->
      <div class="notif-icon flex-shrink-0 mt-1">
        <i class="bi fs-4" [ngClass]="[getIcon(n.type), getColor(n.type)]"></i>
      </div>

      <!-- Contenido -->
      <div class="flex-grow-1 text-start">
        <div class="d-flex justify-content-between align-items-start">
          <span class="fw-semibold">{{ n.title }}</span>
          <small class="text-muted ms-2 flex-shrink-0">
            {{ n.created_at | date:'d MMM, h:mm a' }}
          </small>
        </div>
        <p class="mb-0 text-muted small">{{ n.body }}</p>
      </div>

      <!-- Punto no leída -->
      <span *ngIf="!n.is_read"
            class="badge bg-primary rounded-circle p-1 flex-shrink-0 mt-1"
            title="Sin leer">&nbsp;</span>
    </button>
  </div>

  <!-- Paginación -->
  <nav *ngIf="totalPages > 1" class="mt-4 d-flex justify-content-center">
    <ul class="pagination pagination-sm">
      <li class="page-item" [class.disabled]="page === 1">
        <button class="page-link" (click)="changePage(page - 1)">
          <i class="bi bi-chevron-left"></i>
        </button>
      </li>
      <li *ngFor="let p of getPages()"
          class="page-item" [class.active]="p === page">
        <button class="page-link" (click)="changePage(p)">{{ p }}</button>
      </li>
      <li class="page-item" [class.disabled]="page === totalPages">
        <button class="page-link" (click)="changePage(page + 1)">
          <i class="bi bi-chevron-right"></i>
        </button>
      </li>
    </ul>
  </nav>

</div>
