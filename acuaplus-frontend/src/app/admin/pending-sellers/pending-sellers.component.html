<div class="container py-4">
  
  <h5 class="fw-bold mb-4">Vendedores pendientes de aprobación</h5>

  <!-- Skeleton -->
  <div *ngIf="loading">
    <div *ngFor="let i of [1,2,3]" class="card border-0 shadow-sm mb-3">
      <div class="card-body placeholder-glow d-flex gap-3 align-items-center">
        <span class="placeholder rounded-circle" style="width:40px;height:40px;"></span>
        <div class="flex-grow-1">
          <span class="placeholder col-4 d-block mb-1"></span>
          <span class="placeholder col-6"></span>
        </div>
      </div>
    </div>
  </div>

  <!-- Error -->
  <div *ngIf="error && !loading" class="alert alert-warning d-flex align-items-center gap-2">
    <i class="bi bi-exclamation-triangle"></i>
    No se pudo cargar la lista.
    <button class="btn btn-sm btn-warning ms-auto" (click)="loadPendingSellers()">
      Reintentar
    </button>
  </div>

  <!-- Sin pendientes -->
  <div *ngIf="!loading && !error && sellers.length === 0"
       class="text-center py-5 text-muted">
    <i class="bi bi-check-circle fs-1"></i>
    <p class="mt-2">No hay vendedores pendientes.</p>
  </div>

  <!-- Lista -->
  <div *ngFor="let seller of sellers" class="card border-0 shadow-sm mb-3">
    <div class="card-body d-flex align-items-center gap-3 flex-wrap">
      <div class="rounded-circle bg-secondary d-flex align-items-center justify-content-center text-white fw-bold"
           style="width:42px;height:42px;font-size:1.1rem;flex-shrink:0">
        {{ seller.name.charAt(0).toUpperCase() }}
      </div>
      <div class="flex-grow-1">
        <p class="fw-semibold mb-0">{{ seller.name }}</p>
        <p class="text-muted small mb-0">{{ seller.email }}</p>
      </div>

      <!-- Feedback de acción -->
      <span *ngIf="actionSuccess[seller.id]"
            class="badge"
            [class.bg-success]="actionSuccess[seller.id] === 'aprobado'"
            [class.bg-warning]="actionSuccess[seller.id] === 'suspendido'">
        {{ actionSuccess[seller.id] === 'aprobado' ? '✓ Aprobado' : '⚠ Suspendido' }}
      </span>

      <!-- Botones -->
      <div *ngIf="!actionSuccess[seller.id]" class="d-flex gap-2">
        <button class="btn btn-success btn-sm"
                [disabled]="actionLoading[seller.id]"
                (click)="approve(seller.id)">
          <span *ngIf="actionLoading[seller.id]"
                class="spinner-border spinner-border-sm me-1"></span>
          Aprobar
        </button>
        <button class="btn btn-outline-danger btn-sm"
                [disabled]="actionLoading[seller.id]"
                (click)="suspend(seller.id)">
          Suspender
        </button>
      </div>
    </div>
  </div>
</div>
