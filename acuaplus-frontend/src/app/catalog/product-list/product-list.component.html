<div
  *ngIf="cartToast"
  class="position-fixed bottom-0 end-0 p-3"
  style="z-index: 1100;"
>
  <div class="toast show align-items-center text-white bg-success border-0">
    <div class="d-flex">
      <div class="toast-body">
        <i class="bi bi-cart-check me-2"></i> {{ cartToast }}
      </div>
    </div>
  </div>
</div>

<div class="container-fluid py-4">
    <div class="row g-4">
        <div class="col-lg-3">
            <div class="card border-0 shadow-sm sticky-top" style="top: 80px;">
                <div class="card-body p-4">
                    <div class="d-flex justify-content-between align-items-center mb-3">
                        <h6 class="fw-bold mb-0"><i class="bi bi-funnel me-2 text-primary"></i>Filtros</h6>
                        <button class="btn btn-link btn-sm text-muted p-0 text-decoration-none" (click)="clearFilters()">Limpiar</button>

                    </div>
<form [formGroup]="filterForm">
    <div class="mb-3">
        <label class="form-label small fw-semibold">Buscar</label>
        <div class="input-group input-group-sm">
            <span class="input-group-text bg-white">
                <i class="bi bi-search text-muted"></i>
            </span>
            <input type="text"
            formControlName="search"
            class="form-control border-start-0"
            placeholder="Nombre del producto"/>
        </div>
    </div>
    <div class="mb-3">
        <label class="form-label small fw-semibold">Categoria</label>
        <select formControlName="category" class="form-select form-select-sm">
            <option value="">Todas las categorias</option>
            <!-- <option ngFor="let cat of categories"[value]="cat.value">{{ cat.label }}</option> -->
        </select>
    </div>
    <div class="mb-3">
<label class="form-label small fw-sembibold">Precio (COP)</label>
<div class="row g-2">
    <div class="col-6">
        <input type="number"
        formControlName="minPrice"
        class="form-control form-control-sm"
        placeholder="Min"
        min="0"/>
    </div>
    <div class="col-6">
        <input type="number"
        formControlName="maxPrice"
        class="form-control form-control-sm"
        placeholder="Max"
        min="0"/>
    </div>
</div>
<button type="button"
class="btn btn-outline-primary btn-sm w-100 mt-2" (click)="applyPriceFilter()">
Aplicar precio
</button>
    </div>
</form>
                </div>
            </div>

        </div>
        <div class="col-lg-9">
            <div class="d-flex justify-content-between align-items-center mb-3">
                <div>
                    <h5 class="fw-bold mb-0">Catalogo de Productos</h5>
                    <p class="text-muted small mb-0" *ngIf="!loading">{{totalProducts}} producto{{totalProducts !== 1? 's': ''}} encontrado{{totalProducts !== 1? 's': ''}}</p>
                </div>
            </div>
            <div *ngIf="error" class="alert alert-warning d-flex algn-items-center gap-2">
                <i class="bi bi-exclamation-triangle"></i>
                {{error}}
                <button class="btn btn-sm btn-warning ms-auto" (click)="loadProducts()">Reintentar</button>
            </div>
            <div *ngIf="loading" class="row g-3">
                <div class="col-sm-6 col-x1-4" *ngFor=" let i of [1,2,3,4,5,6]">
                    <div class="card border-0 shadow-sm">
                        <div class="placeholder-glow">
                            <div class="bg-secondary" style="height: 200px; border-radius: 0.375rem o.375rem 0 0; opacity: 0.1;"></div>
                        </div>
                        <div class="card-body placeholder-glow">
                            <span class="placeholder col-4 mb-2 d-block"></span>
                                <span class="placeholder col-8 mb-1 d-block"></span>
                                    <span class="placeholder col-6 mb-3 d-block"></span>
                                        <span class="placeholder col-4 d-block" style="height: 1.5rem;"></span>
                                    
                        </div>
                    </div>
                </div>
            </div>
            <div *ngIf="!loading && !error && products.length === 0" class="text-center py-5">
                <div class="fs-1 mb-3"> buscar </div>
                <h5 class="fw-bold"> No se encontraron productos </h5>
                <button class="btn btn-outline-primary btn-sm" (click)="clearFilters()">Limpiar filtros

                </button>
            </div>
            <div *ngIf="!loading && products.length > 0" class="row g-3">
                <div class=" col-sm-6 col-xl-4" *ngFor="let product of products">
                    <app-product-card [product]="product" (addToCart)="onAddToCart($event)"></app-product-card>
                </div>
            </div>
            <nav *ngIf="!loading &&totalPages > 1 " class="mt-4">
                <ul class="pagination justify-content-center">
                    <li class="page-item" [class.disabled]="currentPage === 1">
                        <button class="page-link" (click)="goToPage(currentPage - 1)">
                            <i class="bi bi-chevron-left"></i>
                        </button>
                    </li>
                    <li *ngFor="let page of pageNumbers" class="page-item" [class.active]="page === currentPage">
                        <button class="page-link" (click)="goToPage(page)">{{ page}}</button> </li>
                        <li class="page-item" [class.disabled]="currentPage === totalPages">
                            <button class="page-link" (click)="goToPage(currentPage + 1)">
                                <i class="bi bi-chevron-right"></i>
                            </button>
                        </li>
                </ul>
                <p class="text-center text-muted small">
                    Página {{currentPage}} de {{totalPages}}
                </p>
            </nav>
        </div>
    </div>
</div>
