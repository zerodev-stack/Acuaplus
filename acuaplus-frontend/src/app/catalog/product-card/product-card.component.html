<div class="card h-100 shadow-sm border-0">
  <div style="height: 200px; overflow: hidden; background: #f8f9fa">
    <img
      [src]="product.image_url || fallbackImage"
      [alt]="product.name"
      (error)="onImageError($event)"
      class="card-img-top"
      style="width: 100%; height: 100%; object-fit: cover"
      loading="lazy"
    />
  </div>
  <div class="card-body d-flex flex-column">
    <span
      class="badge bg-primary bg-opacity-10 text-primary mb-2"
      style="width: fit-content"
      >{{ product.category }}
    </span>
    <h6 class="card-title fw-bold mb-1 text-truncate" [title]="product.name">
      {{ product.name }}
    </h6>
    <p
      class="card-text small text-muted flex-grow-1"
      style="
        display: -webkit-box;
        -webkit-line-clamp: 2;
        -webkit-box-orient: vertical;
        overflow: hidden;
      "
    >
      {{ product.description }}
    </p>
    <div class="d-flex justify-content-between align-items-center mb-3 mt-2">
      <span class="fw-bold text-primary fs-6">{{
        formatPrice(product.price)
      }}</span>
      <span
        class="badge"
        [class.bg-success]="product.stock > 10"
        [class.bg-warning]="product.stock > 0 && product.stock <= 10"
        [class.bg-danger]="product.stock === 0"
      >
        {{ product.stock === 0 ? "Agotado" : product.stock + " disponibles" }}
      </span>
    </div>
    <div class="d-grip gap-2">
      <a [routerLink]="['/catalog', product.id]" class="btn btn-outline-primary btn-sm"
        ><i class="bi bi-eye me-1"></i>Ver detalle</a
      >
      <button
        class="btn btn-primary btn-sm"
        [disabled]="product.stock === 0"
        (click)="onAddToCart()"
      >
        <i class="bi bi-cart-plus me-1"></i
        >{{ product.stock === 0 ? "Agregar al carrito" : "Agregar al carrito" }}
      </button>
    </div>
  </div>
</div>
